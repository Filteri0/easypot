# easypot single-host deployment: two identical honeypots + one log collector.
#
# Topology
#   host1  (ssh on host :2201)  ─┐
#                                ├─►  shared "audit" volume  ─►  collector
#   host2  (ssh on host :2202)  ─┘
#
# Both honeypots run the SAME emulated system (same fs.json, same SystemProfile);
# the only difference is hostname (host1 / host2). This is deliberate: the goal
# is to demonstrate "one design, deployed on N nodes, sharing one LLM pool"
# (the scale-out claim), NOT to compare different personas. With identical
# machines, the two nodes' miss rates should match — evidence that adding nodes
# doesn't change the architecture. Each honeypot appends structured JSON-line
# events to its own file on the shared volume; the collector merges + tags them.
#
# LLM (paper §3.4 hybrid): both honeypots enable --llm and point at the Ollama
# running on the *host* (host.docker.internal), so all nodes share one model
# pool. registry-missed commands are generated by the model; hits stay on the
# cheap rule path. See extra_hosts below — required on Linux Docker.
#
# SECURITY: honeypots are meant to be attacked. In real use put these on an
# isolated network segment and firewall outbound traffic. This compose exposes
# SSH ports on the host for convenience; harden before internet exposure.

name: easypot

x-honeypot-llm: &honeypot-llm
  # Shared LLM env for both honeypots. host.docker.internal resolves to the
  # host (see extra_hosts); Ollama must be running there (ollama serve).
  EASYPOT_LLM: "1"
  EASYPOT_LLM_MODEL: "qwen2.5:14b"
  EASYPOT_LLM_URL: "http://host.docker.internal:11434"

services:
  host1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: easypot:latest
    restart: unless-stopped
    environment:
      <<: *honeypot-llm
      HONEYPOT_HOSTNAME: host1
      EASYPOT_AUDIT_JSONL: /data/audit/host1.jsonl
      HONEYPOT_HOST_KEY: /data/keys/host1_rsa_key
    ports:
      - "2201:2222"          # host:container — ssh -p 2201 user@<host>
    volumes:
      - audit:/data/audit
      - keys-1:/data/keys
    # Linux Docker: map host.docker.internal to the host gateway so the
    # container can reach the host's Ollama. (Mac/Windows Docker have this
    # built in; on Linux it MUST be declared or the LLM calls fail.)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [trap]

  host2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: easypot:latest        # reuse the image built by host1
    restart: unless-stopped
    depends_on: [host1]          # so the image is built once, then reused
    environment:
      <<: *honeypot-llm
      HONEYPOT_HOSTNAME: host2
      EASYPOT_AUDIT_JSONL: /data/audit/host2.jsonl
      HONEYPOT_HOST_KEY: /data/keys/host2_rsa_key
    ports:
      - "2202:2222"
    volumes:
      - audit:/data/audit
      - keys-2:/data/keys
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [trap]

  collector:
    build:
      context: ..
      dockerfile: deploy/collector/Dockerfile
    image: easypot-collector:latest
    restart: unless-stopped
    depends_on: [host1, host2]
    environment:
      AUDIT_DIR: /data/audit
      # Merged, source-tagged output the analyzer reads (honeyshell.analyze).
      MERGED_OUT: /data/audit/_merged.jsonl
    volumes:
      - audit:/data/audit
    networks: [trap]

networks:
  trap:
    driver: bridge

volumes:
  # Shared JSONL feed. Both the honeypot and collector images run as uid 10001
  # (see deploy/Dockerfile and deploy/collector/Dockerfile) so this volume has a
  # single, consistent owner no matter which container initialises it first —
  # avoiding the "owned by 10002, unwritable by 10001" crash-loop. Do NOT give
  # the two images different uids.
  audit:      # honeypots write, collector reads + merges
  keys-1:     # persisted host keys -> stable SSH fingerprints across restarts
  keys-2:
